<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users - FreshMart Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <span class="brand">🛒 FreshMart Admin</span>
    <div>
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/products">Products</a>
        <a href="/admin/users">Users</a>
        <a href="/admin/orders">Orders</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="container">
    <h2 style="margin-bottom:20px;">Registered Users</h2>
    <table>
        <thead>
            <tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Action</th></tr>
        </thead>
        <tbody>
            <tr th:each="u : ${users}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.name}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.phone != null} ? ${u.phone} : '-'"></td>
                <td th:text="${u.role}"></td>
                <td>
                    <form method="post" th:action="@{/admin/users/delete/{id}(id=${u.id})}" style="display:inline;"
                          th:if="${u.role != 'ADMIN'}">
                        <button type="submit" class="btn btn-danger btn-sm"
                                onclick="return confirm('Delete this user?')">Delete</button>
                    </form>
                    <span th:if="${u.role == 'ADMIN'}" style="color:#888;">—</span>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
