<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - FreshMart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-box">
    <h2>🛒 Create Account</h2>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <form method="post" action="/register" th:object="${user}">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" th:field="*{name}" required placeholder="Your name">
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;font-size:0.85rem"></span>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}" required placeholder="your@email.com">
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red;font-size:0.85rem"></span>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" th:field="*{password}" required placeholder="Min 6 characters">
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red;font-size:0.85rem"></span>
        </div>
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
    <p style="text-align:center; margin-top:16px;">
        Have an account? <a href="/login">Login</a>
    </p>
</div>
</body>
</html>
