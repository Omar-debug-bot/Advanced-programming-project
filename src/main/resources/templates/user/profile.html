<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile - FreshMart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <span class="brand">🛒 FreshMart</span>
    <div>
        <a href="/user/home">Shop</a>
        <a href="/user/orders">My Orders</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="auth-box" style="margin-top:30px;">
        <h2>My Profile</h2>
        <div th:if="${param.updated}" class="alert alert-success">Profile updated!</div>
        <form method="post" action="/user/profile" th:object="${user}">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" th:field="*{name}" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" readonly style="background:#f0f0f0;">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" th:field="*{phone}" placeholder="Optional">
            </div>
            <div class="form-group">
                <label>Default Delivery Address</label>
                <input type="text" th:field="*{address}" placeholder="Optional">
            </div>
            <div class="form-group">
                <label>New Password (leave blank to keep current)</label>
                <input type="password" name="password" placeholder="New password">
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>
</body>
</html>
