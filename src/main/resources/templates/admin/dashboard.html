<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - FreshMart</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <span class="brand">🛒 FreshMart Admin</span>
    <div>
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/products">Products</a>
        <a href="/admin/users">Users</a>
        <a href="/admin/orders">Orders</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="container">
    <h2 style="margin-bottom:20px;">Dashboard</h2>

    <div class="stats">
        <div class="stat-card">
            <div class="number" th:text="${productCount}">0</div>
            <div class="label">Products</div>
        </div>
        <div class="stat-card">
            <div class="number" th:text="${userCount}">0</div>
            <div class="label">Registered Users</div>
        </div>
        <div class="stat-card">
            <div class="number" th:text="${orderCount}">0</div>
            <div class="label">Total Orders</div>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-bottom:16px;">Recent Orders</h3>
        <table>
            <thead>
                <tr><th>#</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr>
            </thead>
            <tbody>
                <tr th:each="order : ${recentOrders}">
                    <td th:text="${order.id}"></td>
                    <td th:text="${order.user.name}"></td>
                    <td>EGP <span th:text="${#numbers.formatDecimal(order.totalPrice, 1, 2)}"></span></td>
                    <td>
                        <span class="badge"
                              th:classappend="${order.status == 'PENDING'} ? 'badge-pending' :
                                               (${order.status == 'CONFIRMED'} ? 'badge-confirmed' :
                                               (${order.status == 'DELIVERED'} ? 'badge-delivered' : 'badge-cancelled'))"
                              th:text="${order.status}"></span>
                    </td>
                    <td th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy')}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
