<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Orders - FreshMart Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <span class="brand">🛒 FreshMart Admin</span>
    <div>
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/products">Products</a>
        <a href="/admin/users">Users</a>
        <a href="/admin/orders">Orders</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="container">
    <h2 style="margin-bottom:20px;">All Orders</h2>

    <div th:each="order : ${orders}" class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
            <div>
                <strong>Order #<span th:text="${order.id}"></span></strong>
                &nbsp; by &nbsp;
                <span th:text="${order.user.name}"></span>
                &nbsp;
                <span class="badge"
                      th:classappend="${order.status == 'PENDING'} ? 'badge-pending' :
                                       (${order.status == 'CONFIRMED'} ? 'badge-confirmed' :
                                       (${order.status == 'DELIVERED'} ? 'badge-delivered' : 'badge-cancelled'))"
                      th:text="${order.status}"></span>
            </div>
            <div style="color:#888; font-size:0.9rem;" th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy HH:mm')}"></div>
        </div>

        <table style="margin-top:10px;">
            <thead>
                <tr><th>Product</th><th>Qty</th><th>Price</th></tr>
            </thead>
            <tbody>
                <tr th:each="item : ${order.items}">
                    <td th:text="${item.product.name}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td>EGP <span th:text="${#numbers.formatDecimal(item.subtotal, 1, 2)}"></span></td>
                </tr>
            </tbody>
        </table>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:12px; flex-wrap:wrap; gap:10px;">
            <div>
                <strong>Total: EGP <span th:text="${#numbers.formatDecimal(order.totalPrice, 1, 2)}"></span></strong>
                &nbsp; | Address: <span th:text="${order.deliveryAddress}"></span>
            </div>
            <form method="post" action="/admin/orders/status" style="display:flex; gap:8px;">
                <input type="hidden" name="orderId" th:value="${order.id}">
                <select name="status" style="padding:6px; border:1px solid #ccc; border-radius:4px;">
                    <option value="PENDING" th:selected="${order.status == 'PENDING'}">PENDING</option>
                    <option value="CONFIRMED" th:selected="${order.status == 'CONFIRMED'}">CONFIRMED</option>
                    <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">DELIVERED</option>
                    <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">CANCELLED</option>
                </select>
                <button type="submit" class="btn btn-primary" style="width:auto; margin:0;">Update</button>
            </form>
        </div>
    </div>

    <p th:if="${#lists.isEmpty(orders)}" style="color:#888;">No orders yet.</p>
</div>
</body>
</html>
